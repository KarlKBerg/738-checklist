<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/media-queries.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/b5a5784c82.js"
      crossorigin="anonymous"
    ></script>
    <title>737-800 checklist</title>
  </head>
  <body>
    <aside>
      <div class="header">
        <span id="plane-type">B737-800</span>
        <span id="checklist-type" class="inter">Normal checklist</span>
        <span id="flight-time">FLT TIME: 47:13</span>
      </div>
      <div class="menu">
        <div class="menu-item active">
          <span class="inter">PREFLIGHT</span>
          <span id="menu-item-completion" class="inter">0/8</span>
        </div>
        <div class="menu-item">
          <span class="inter">BEFORE START</span>
          <span id="menu-item-completion" class="inter">0/11</span>
        </div>
      </div>
    </aside>
    <main>
      <div class="header">
        <div class="info">
          <div class="info-top">
            <span id="phase-number-info">PHASE 01</span>
            <i class="fa-solid fa-circle"></i>
            <span id="phase-info-name">PREFLIGHT</span>
          </div>
          <div class="header-bottom">
            <span id="phase-name-big" class="inter">Preflight</span>
            <span id="completed-checks" class="">0/7 completed</span>
          </div>
        </div>
        <div class="checklist-container"></div>
      </div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
